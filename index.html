<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Solar Circle | Coming Soon</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background-color 2s ease;
            overflow: hidden;
            animation: skyCycle 20s infinite linear;
        }

        /* Text at the top */
        .text-content {
            margin-bottom: 40px; /* Space between text and animation */
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .orbit-container {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .solar-hero {
            position: relative;
            width: 110px;
            height: 70px;
            background: #0077b6;
            border: 5px solid currentColor;
            border-radius: 10px;
            transform: perspective(500px) rotateX(25deg);
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 3px;
            padding: 5px;
            z-index: 5;
        }

        .grid-cell { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .cycle-wheel {
            position: absolute;
            width: 340px;
            height: 340px;
            animation: fullRotation 20s infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .day-group, .night-group {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .day-group { top: 0; }
        .night-group { bottom: 0; }

        .sun {
            position: absolute; top: -15px; left: -10px;
            width: 55px; height: 55px;
            background: #ffcc00; border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.6);
        }
        .cloud {
            position: relative; width: 100px; height: 40px;
            background: #95a5a6; border-radius: 50px;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #95a5a6; border-radius: 50%; }
        .cloud::before { width: 55px; height: 55px; top: -25px; left: 15px; }
        .cloud::after { width: 45px; height: 45px; top: -15px; left: 45px; }

        .moon {
            width: 50px; height: 50px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 12px 12px 0 0 #f1c40f;
            transform: rotate(160deg);
        }

        @keyframes fullRotation {
            from { transform: rotate(-90deg); }
            to { transform: rotate(270deg); }
        }

        @keyframes skyCycle {
            0%   { background-color: #0b1426; color: white; }
            15%  { background-color: #dbe9f4; color: #002d5b; }
            25%  { background-color: #f4f7f9; color: #002d5b; }
            35%  { background-color: #dbe9f4; color: #002d5b; }
            50%  { background-color: #0b1426; color: white; }
            75%  { background-color: #050a14; color: white; }
            100% { background-color: #0b1426; color: white; }
        }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin: 0; }
        p { color: #ff8c00; font-weight: bold; font-size: 1.2rem; margin: 5px 0; }
        .tagline { 
            margin-top: 15px; 
            font-size: 0.85rem; 
            opacity: 0.8; 
            letter-spacing: 1px; 
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="text-content">
        <h1>THE SOLAR CIRCLE</h1>
        <p>Waiting for the sunshine...</p>
        <div class="tagline">
            REAL DATA. SHARED SIMPLY.<br>
            <strong>Launching soon</strong>
        </div>
    </div>

    <div class="orbit-container">
        <div class="cycle-wheel">
            <div class="day-group">
                <div class="sun"></div>
                <div class="cloud"></div>
            </div>
            <div class="night-group">
                <div class="moon"></div>
            </div>
        </div>

        <div class="solar-hero">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    </div>

</body>
</html>
