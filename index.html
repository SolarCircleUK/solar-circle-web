<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Solar Circle | Coming Soon</title>
    <style>
        body {
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #002d5b;
            text-align: center;
            overflow: hidden;
        }

        .orbit-container {
            position: relative;
            width: 450px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Cartoon Solar Panel */
        .solar-hero {
            position: relative;
            width: 110px;
            height: 70px;
            background: #0077b6;
            border: 5px solid #002d5b;
            border-radius: 10px;
            transform: perspective(500px) rotateX(25deg);
            box-shadow: 0 10px 0 #005a8a, 0 15px 25px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 3px;
            padding: 5px;
            z-index: 5;
        }

        .grid-cell { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* The Giant Rotating Wheel */
        .cycle-wheel {
            position: absolute;
            width: 400px;
            height: 400px;
            animation: fullRotation 15s infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Weather Group (Sun/Cloud) */
        .day-group {
            position: absolute;
            top: 0; /* Top of the wheel */
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: rotate(0deg); /* Keeps it upright */
        }

        /* Night Group (Moon) */
        .night-group {
            position: absolute;
            bottom: 0; /* Bottom of the wheel */
            transform: rotate(180deg); /* Keeps it upright */
        }

        /* SUN & CLOUD */
        .sun {
            position: absolute; top: -15px; left: -10px;
            width: 55px; height: 55px;
            background: #ffcc00; border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }
        .cloud {
            position: relative; width: 100px; height: 40px;
            background: #95a5a6; border-radius: 50px;
        }
        .cloud::before { content: ''; position: absolute; width: 50px; height: 50px; background: #95a5a6; border-radius: 50%; top: -25px; left: 15px; }
        .cloud::after { content: ''; position: absolute; width: 40px; height: 40px; background: #95a5a6; border-radius: 50%; top: -15px; left: 45px; }

        /* MOON (Crescent) */
        .moon {
            width: 50px; height: 50px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 12px 12px 0 0 #002d5b; /* Creates the crescent shape */
            transform: rotate(-20deg);
        }

        @keyframes fullRotation {
            from { transform: rotate(-90deg); }
            to { transform: rotate(270deg); }
        }

        h1 { margin-top: 40px; font-size: 2rem; font-weight: 900; }
        p { color: #ff8c00; font-weight: bold; font-size: 1.1rem; margin: 5px 0; }
        .tagline { margin-top: 15px; font-size: 0.8rem; color: #777; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="orbit-container">
        <div class="cycle-wheel">
            <div class="day-group">
                <div class="sun"></div>
                <div class="cloud"></div>
            </div>
            <div class="night-group">
                <div class="moon"></div>
            </div>
        </div>

        <div class="solar-hero">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    </div>

    <h1>THE SOLAR CIRCLE</h1>
    <p>Waiting for the sunshine...</p>

    <div class="tagline">
        REAL DATA. SHARED SIMPLY.<br>
        <strong>LAUNCHING SOON</strong>
    </div>

</body>
</html>
