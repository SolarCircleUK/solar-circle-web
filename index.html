<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Solar Circle | Coming Soon</title>
    <style>
        /* The Master Cycle - Controls Background and Text Colors */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background-color 1.5s ease, color 1.5s ease;
            overflow: hidden;
            /* Syncs background color with the rotation */
            animation: skyCycle 15s infinite linear;
        }

        .orbit-container {
            position: relative;
            width: 450px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Cartoon Solar Panel */
        .solar-hero {
            position: relative;
            width: 110px;
            height: 70px;
            background: #0077b6;
            border: 5px solid currentColor; /* Matches text color automatically */
            border-radius: 10px;
            transform: perspective(500px) rotateX(25deg);
            box-shadow: 0 10px 0 rgba(0,0,0,0.2), 0 15px 25px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 3px;
            padding: 5px;
            z-index: 5;
        }

        .grid-cell { background: rgba(255,255,255,0.2); border-radius: 2px; }

        /* The Rotating Wheel */
        .cycle-wheel {
            position: absolute;
            width: 450px;
            height: 450px;
            animation: fullRotation 15s infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .day-group {
            position: absolute;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .night-group {
            position: absolute;
            bottom: 0;
        }

        /* SUN & CLOUD */
        .sun {
            position: absolute; top: -15px; left: -10px;
            width: 55px; height: 55px;
            background: #ffcc00; border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.6);
        }
        .cloud {
            position: relative; width: 100px; height: 40px;
            background: #95a5a6; border-radius: 50px;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #95a5a6; border-radius: 50%; }
        .cloud::before { width: 55px; height: 55px; top: -25px; left: 15px; }
        .cloud::after { width: 45px; height: 45px; top: -15px; left: 45px; }

        /* MOON */
        .moon {
            width: 50px; height: 50px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 12px 12px 0 0 #f1c40f; /* Yellow crescent */
            transform: rotate(160deg); /* Oriented for its position in orbit */
        }

        /* ANIMATIONS */
        @keyframes fullRotation {
            from { transform: rotate(-90deg); }
            to { transform: rotate(270deg); }
        }

        @keyframes skyCycle {
            0%, 100% { background-color: #0b1426; color: white; } /* Midnight */
            25% { background-color: #f4f7f9; color: #002d5b; }    /* Midday */
            50% { background-color: #0b1426; color: white; }    /* Midnight */
            75% { background-color: #f4f7f9; color: #002d5b; }    /* Midday (Loop) */
        }

        h1 { margin-top: 40px; font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }
        p { color: #ff8c00; font-weight: bold; font-size: 1.2rem; margin: 5px 0; }
        .tagline { margin-top: 15px; font-size: 0.85rem; opacity: 0.8; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="orbit-container">
        <div class="cycle-wheel">
            <div class="day-group">
                <div class="sun"></div>
                <div class="cloud"></div>
            </div>
            <div class="night-group">
                <div class="moon"></div>
            </div>
        </div>

        <div class="solar-hero">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    </div>

    <h1>THE SOLAR CIRCLE</h1>
    <p>Waiting for the sunshine...</p>

    <div class="tagline">
        REAL DATA. SHARED SIMPLY.<br>
        <strong>Launching soon</strong>
    </div>

</body>
</html>
