        .scene {

        /* The Weather Icon (Sun in Cloud) */
        .weather-wrap {
            position: absolute;
            top: 0;
            animation: drift 10s infinite ease-in-out;
            z-index: 10;
        }

            position: absolute;

            left: -15px;
            width: 55px;
            height: 55px;
            background: #ffce00;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 206, 0, 0.5);

        .icon-cloud {
            position: relative;
            width: 110px;
            height: 45px;
            background: #7f8c8d; /* Solid moody grey */
            border-radius: 50px;
        }

            content: '';
            position: absolute;
            background: #7f8c8d;
            border-radius: 50%;

        .icon-cloud::after { width: 55px; height: 55px; top: -25px; left: 15px; }
        .icon-cloud::before { width: 45px; height: 45px; top: -15px; left: 50px; }
