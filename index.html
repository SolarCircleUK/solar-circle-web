<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Solar Circle | Coming Soon</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #002d5b;
            text-align: center;
            overflow: hidden;
        }

        .stage {
            position: relative;
            width: 300px;
            height: 200px;
            margin-bottom: 20px;
        }

        /* The Sun */
        .sun {
            position: absolute;
            top: 20px;
            right: 80px;
            width: 50px;
            height: 50px;
            background: #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 30px #ffcc00;
        }

        /* The House */
        .house {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 70px;
            background: #d1d8e0;
            border: 3px solid #002d5b;
        }
        /* The Roof */
        .house::before {
            content: '';
            position: absolute;
            top: -43px;
            left: -3px;
            width: 0;
            height: 0;
            border-left: 53px solid transparent;
            border-right: 53px solid transparent;
            border-bottom: 40px solid #002d5b;
        }

        /* The Solar Panel on the roof */
        .panel {
            position: absolute;
            top: -30px;
            left: 20px;
            width: 45px;
            height: 25px;
            background: #0077b6;
            border: 1px solid #fff;
            transform: skewX(-20deg);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            z-index: 2;
        }
        .cell { background: rgba(255,255,255,0.2); }

        /* The Darker Cloud */
        .cloud {
            position: absolute;
            top: 30px;
            width: 100px;
            height: 40px;
            background: #95a5a6; /* Darker grey */
            border-radius: 50px;
            animation: drift 10s infinite linear;
            z-index: 3;
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: #95a5a6;
            border-radius: 50%;
        }
        .cloud::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud::before { width: 40px; height: 40px; top: -15px; left: 45px; }

        @keyframes drift {
            0% { left: -150px; opacity: 0; }
            10% { opacity: 1; }
            50% { left: 100px; }
            90% { opacity: 1; }
            100% { left: 350px; opacity: 0; }
        }

        h1 { margin-top: 20px; font-weight: 800; letter-spacing: 1px; }
        p { color: #ff8c00; font-weight: bold; margin-top: 5px; }
        .status { margin-top: 25px; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

    <div class="stage">
        <div class="sun"></div>
        <div class="house">
            <div class="panel">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
        </div>
        <div class="cloud"></div>
    </div>

    <h1>THE SOLAR CIRCLE</h1>
    <p>Waiting for the sunshine...</p>

    <div class="status">
        Real data. Shared simply.<br>
        <strong>Launching Soon</strong>
    </div>

</body>
</html>
