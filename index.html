<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Solar Circle | Coming Soon</title>
    <style>
        body {
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #002d5b;
            text-align: center;
            overflow: hidden;
        }

        .orbit-container {
            position: relative;
            width: 400px;
            height: 280px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
        }

        /* The Cartoon Solar Panel (Scaled down 15%) */
        .solar-hero {
            position: relative;
            width: 115px; /* Reduced from 140px */
            height: 75px;  /* Reduced from 90px */
            background: #0077b6;
            border: 5px solid #002d5b;
            border-radius: 10px;
            transform: perspective(500px) rotateX(25deg);
            box-shadow: 0 12px 0 #005a8a, 0 15px 25px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 3px;
            padding: 5px;
            overflow: hidden;
            z-index: 5;
        }

        .solar-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: rgba(255,255,255,0.15);
            z-index: 2;
        }

        .grid-cell { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* The Weather Icon Grouping */
        .weather-orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            /* This animation handles the "Arc" by rotating the container */
            animation: sunPath 10s infinite linear;
            transform-origin: bottom center;
            bottom: -50px;
            left: 0;
        }

        .icon-group {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .sun {
            position: absolute;
            top: -25px;
            left: -20px;
            width: 65px;
            height: 65px;
            background: #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
        }

        .cloud {
            position: relative;
            width: 120px;
            height: 50px;
            background: #95a5a6;
            border-radius: 50px;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute;
            background: #95a5a6; border-radius: 50%;
        }
        .cloud::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud::after { width: 50px; height: 50px; top: -20px; left: 55px; }

        /* The Arc Animation */
        @keyframes sunPath {
            0% { transform: rotate(-70deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: rotate(70deg); opacity: 0; }
        }

        h1 { margin-top: 10px; font-size: 2rem; font-weight: 900; }
        p { color: #ff8c00; font-weight: bold; font-size: 1.2rem; margin: 5px 0; }
        .tagline { margin-top: 20px; font-size: 0.9rem; color: #777; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="orbit-container">
        <div class="weather-orbit">
            <div class="icon-group">
                <div class="sun"></div>
                <div class="cloud"></div>
            </div>
        </div>

        <div class="solar-hero">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    </div>

    <h1>THE SOLAR CIRCLE</h1>
    <p>Waiting for the sunshine...</p>

    <div class="tagline">
        REAL DATA. SHARED SIMPLY.<br>
        <strong>LAUNCHING SOON</strong>
    </div>

</body>
</html>
