<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Solar Circle | Coming Soon</title>
    <style>
        body {
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #002d5b;
            text-align: center;
        }

        .container {
            position: relative;
            width: 300px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Cartoon Solar Panel Icon */
        .solar-hero {
            position: relative;
            width: 140px;
            height: 90px;
            background: #0077b6;
            border: 6px solid #002d5b;
            border-radius: 12px;
            transform: perspective(500px) rotateX(20deg);
            box-shadow: 0 15px 0 #005a8a, 0 20px 30px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 4px;
            padding: 6px;
            overflow: hidden;
        }

        /* Glossy overlay for the "Glass" look */
        .solar-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: rgba(255,255,255,0.15);
            z-index: 2;
        }

        .grid-cell {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* The Weather Icon Group */
        .weather-float {
            position: absolute;
            top: 20px;
            z-index: 10;
            animation: drift 12s infinite ease-in-out;
        }

        .sun {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 60px;
            height: 60px;
            background: #ffcc00;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        .cloud {
            position: relative;
            width: 120px;
            height: 50px;
            background: #95a5a6; /* Moody Grey */
            border-radius: 50px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.05);
        }
        .cloud::before {
            content: ''; position: absolute;
            width: 60px; height: 60px;
            background: #95a5a6;
            border-radius: 50%;
            top: -30px; left: 20px;
        }
        .cloud::after {
            content: ''; position: absolute;
            width: 50px; height: 50px;
            background: #95a5a6;
            border-radius: 50%;
            top: -20px; left: 55px;
        }

        @keyframes drift {
            0% { transform: translateX(-220px); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateX(220px); opacity: 0; }
        }

        h1 { margin-top: 20px; font-size: 2rem; font-weight: 900; }
        p { color: #ff8c00; font-weight: bold; font-size: 1.2rem; margin: 5px 0; }
        .tagline { margin-top: 20px; font-size: 0.9rem; color: #777; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="weather-float">
            <div class="sun"></div>
            <div class="cloud"></div>
        </div>

        <div class="solar-hero">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
    </div>

    <h1>THE SOLAR CIRCLE</h1>
    <p>Waiting for the sunshine...</p>

    <div class="tagline">
        REAL DATA. SHARED SIMPLY.<br>
        <strong>LAUNCHING SOON</strong>
    </div>

</body>
</html>
